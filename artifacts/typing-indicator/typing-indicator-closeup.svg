<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="Close-up explaining the BrightCart AI TypingIndicator component">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#94a3b8" flood-opacity="0.26"/>
    </filter>
    <style>
      .title{font:800 32px Arial,Helvetica,sans-serif;fill:#0f172a}
      .sub{font:400 15px Arial,Helvetica,sans-serif;fill:#475569}
      .label{font:700 16px Arial,Helvetica,sans-serif;fill:#0f172a}
      .speaker{font:700 12px Arial,Helvetica,sans-serif;fill:#64748b}
      .body{font:400 15px Arial,Helvetica,sans-serif;fill:#334155}
      .code{font:700 14px Consolas,Monaco,monospace;fill:#065f46}
      .muted{font:400 13px Arial,Helvetica,sans-serif;fill:#64748b}
    </style>
  </defs>
  <rect width="1100" height="560" fill="#e9edf4"/>
  <rect x="80" y="70" width="940" height="420" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="120" y="125" class="title">What TypingIndicator Means</text>
  <text x="120" y="153" class="sub">It is a small React component that renders the temporary assistant waiting bubble while isLoading is true.</text>

  <g transform="translate(120 205)">
    <text x="0" y="0" class="label">Before</text>
    <rect x="0" y="28" width="230" height="110" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="28" y="58" width="78" height="48" rx="16" fill="#fff" stroke="#e2e8f0"/>
    <path d="M28 90 L28 106 L44 106 Z" fill="#fff" stroke="#e2e8f0"/>
    <circle cx="52" cy="82" r="4" fill="#10b981" opacity="0.45"/>
    <circle cx="67" cy="82" r="4" fill="#10b981" opacity="0.75"/>
    <circle cx="82" cy="82" r="4" fill="#10b981" opacity="0.45"/>
    <text x="0" y="180" class="body">Dots existed, but the loading bubble</text>
    <text x="0" y="204" class="body">did not visibly identify the assistant.</text>
  </g>

  <g transform="translate(445 205)">
    <text x="0" y="0" class="label">After</text>
    <rect x="0" y="28" width="260" height="110" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="30" y="59" class="speaker">BrightCart AI</text>
    <rect x="28" y="70" width="98" height="48" rx="16" fill="#fff" stroke="#e2e8f0"/>
    <path d="M28 102 L28 118 L44 118 Z" fill="#fff" stroke="#e2e8f0"/>
    <circle cx="57" cy="94" r="4" fill="#10b981" opacity="0.45"/>
    <circle cx="76" cy="94" r="4" fill="#10b981" opacity="0.75"/>
    <circle cx="95" cy="94" r="4" fill="#10b981" opacity="0.45"/>
    <text x="0" y="180" class="body">The indicator now looks like an</text>
    <text x="0" y="204" class="body">assistant message with identity.</text>
  </g>

  <g transform="translate(760 205)">
    <text x="0" y="0" class="label">Code idea</text>
    <rect x="0" y="28" width="220" height="110" rx="18" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="22" y="65" class="code">{isLoading &amp;&amp;</text>
    <text x="22" y="91" class="code">  &lt;TypingIndicator /&gt;}</text>
    <text x="0" y="180" class="body">No extra loading state was added.</text>
    <text x="0" y="204" class="body">It follows the existing request state.</text>
  </g>

  <line x1="120" y1="435" x2="980" y2="435" stroke="#e2e8f0"/>
  <text x="120" y="463" class="muted">Accessibility: role=&quot;status&quot;, aria-live=&quot;polite&quot;, screen-reader text says &quot;BrightCart AI is typing.&quot;</text>
  <text x="120" y="486" class="muted">Reduced motion: the dot animation is disabled when prefers-reduced-motion is enabled.</text>
</svg>
