<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" role="img" aria-label="Desktop before and after comparison of the BrightCart AI typing indicator">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#94a3b8" flood-opacity="0.24"/>
    </filter>
    <style>
      .title{font:800 32px Arial,Helvetica,sans-serif;fill:#0f172a}
      .sub{font:400 15px Arial,Helvetica,sans-serif;fill:#475569}
      .label{font:700 16px Arial,Helvetica,sans-serif;fill:#0f172a}
      .tag{font:700 12px Arial,Helvetica,sans-serif;fill:#047857}
      .h1{font:800 24px Arial,Helvetica,sans-serif;fill:#0f172a}
      .small{font:500 12px Arial,Helvetica,sans-serif;fill:#64748b}
      .chatTitle{font:700 15px Arial,Helvetica,sans-serif;fill:#0f172a}
      .speaker{font:700 12px Arial,Helvetica,sans-serif;fill:#64748b}
      .speakerUser{font:700 12px Arial,Helvetica,sans-serif;fill:#047857}
      .body{font:400 14px Arial,Helvetica,sans-serif;fill:#334155}
      .bodyWhite{font:400 14px Arial,Helvetica,sans-serif;fill:white}
      .caption{font:400 14px Arial,Helvetica,sans-serif;fill:#475569}
    </style>
  </defs>
  <rect width="1440" height="920" fill="#e9edf4"/>
  <text x="80" y="70" class="title">Typing Indicator Before and After</text>
  <text x="80" y="96" class="sub">Same BrightCart chat surface, showing the waiting-for-response state.</text>

  <g transform="translate(80 130)">
    <rect width="610" height="700" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
    <rect width="610" height="52" rx="24" fill="#fff"/>
    <line x1="0" y1="52" x2="610" y2="52" stroke="#e2e8f0"/>
    <text x="22" y="33" class="label">Before</text>
    <rect x="465" y="14" width="124" height="24" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="483" y="31" class="tag">Old loading UI</text>
    <rect x="18" y="72" width="574" height="610" rx="0" fill="#f5f7fb"/>
    <g transform="translate(42 95)">
      <rect width="42" height="42" rx="16" fill="#059669"/>
      <text x="14" y="27" font-family="Arial" font-size="13" font-weight="800" fill="white">BC</text>
      <text x="56" y="20" class="h1">BrightCart AI</text>
      <text x="56" y="39" class="small">24/7 Customer Support Assistant</text>
      <rect x="420" y="7" width="92" height="28" rx="14" fill="#fff" stroke="#a7f3d0"/>
      <text x="439" y="26" class="tag">Active now</text>
    </g>
    <g transform="translate(42 160)">
      <rect width="526" height="430" rx="24" fill="#fff" stroke="#cbd5e1"/>
      <line x1="0" y1="64" x2="526" y2="64" stroke="#f1f5f9"/>
      <circle cx="34" cy="32" r="18" fill="#d1fae5"/>
      <text x="26" y="37" font-family="Arial" font-size="12" font-weight="800" fill="#047857">AI</text>
      <text x="62" y="27" class="chatTitle">BrightCart AI Support</text>
      <text x="62" y="46" class="small">Answers grounded in BrightCart support information</text>
      <rect x="0" y="64" width="526" height="288" fill="#f8fafc" opacity="0.86"/>
      <text x="341" y="118" class="speakerUser">You</text>
      <rect x="286" y="126" width="200" height="48" rx="16" fill="#059669"/>
      <path d="M486 158 L486 174 L470 174 Z" fill="#059669"/>
      <text x="306" y="156" class="bodyWhite">How long does shipping take?</text>
      <rect x="40" y="206" width="72" height="48" rx="16" fill="#fff" stroke="#e2e8f0"/>
      <path d="M40 238 L40 254 L56 254 Z" fill="#fff" stroke="#e2e8f0"/>
      <circle cx="63" cy="230" r="4" fill="#10b981" opacity="0.45"/>
      <circle cx="77" cy="230" r="4" fill="#10b981" opacity="0.75"/>
      <circle cx="91" cy="230" r="4" fill="#10b981" opacity="0.45"/>
      <rect x="0" y="352" width="526" height="78" fill="#fff"/>
      <line x1="0" y1="352" x2="526" y2="352" stroke="#f1f5f9"/>
      <rect x="20" y="368" width="374" height="46" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="38" y="397" class="small">Ask about products, shipping, returns, or payments...</text>
      <rect x="410" y="368" width="96" height="46" rx="16" fill="#020617"/>
      <text x="434" y="397" font-family="Arial" font-size="13" font-weight="800" fill="white">Sending</text>
    </g>
    <text x="42" y="635" class="caption">The old indicator appeared as a small anonymous dots-only bubble.</text>
  </g>

  <g transform="translate(750 130)">
    <rect width="610" height="700" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
    <rect width="610" height="52" rx="24" fill="#fff"/>
    <line x1="0" y1="52" x2="610" y2="52" stroke="#e2e8f0"/>
    <text x="22" y="33" class="label">After</text>
    <rect x="438" y="14" width="151" height="24" rx="12" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="456" y="31" class="tag">New TypingIndicator</text>
    <rect x="18" y="72" width="574" height="610" fill="#f5f7fb"/>
    <g transform="translate(42 95)">
      <rect width="42" height="42" rx="16" fill="#059669"/>
      <text x="14" y="27" font-family="Arial" font-size="13" font-weight="800" fill="white">BC</text>
      <text x="56" y="20" class="h1">BrightCart AI</text>
      <text x="56" y="39" class="small">24/7 Customer Support Assistant</text>
      <rect x="420" y="7" width="92" height="28" rx="14" fill="#fff" stroke="#a7f3d0"/>
      <text x="439" y="26" class="tag">Active now</text>
    </g>
    <g transform="translate(42 160)">
      <rect width="526" height="430" rx="24" fill="#fff" stroke="#cbd5e1"/>
      <line x1="0" y1="64" x2="526" y2="64" stroke="#f1f5f9"/>
      <circle cx="34" cy="32" r="18" fill="#d1fae5"/>
      <text x="26" y="37" font-family="Arial" font-size="12" font-weight="800" fill="#047857">AI</text>
      <text x="62" y="27" class="chatTitle">BrightCart AI Support</text>
      <text x="62" y="46" class="small">Answers grounded in BrightCart support information</text>
      <rect x="0" y="64" width="526" height="288" fill="#f8fafc" opacity="0.86"/>
      <text x="341" y="118" class="speakerUser">You</text>
      <rect x="286" y="126" width="200" height="48" rx="16" fill="#059669"/>
      <path d="M486 158 L486 174 L470 174 Z" fill="#059669"/>
      <text x="306" y="156" class="bodyWhite">How long does shipping take?</text>
      <text x="42" y="210" class="speaker">BrightCart AI</text>
      <rect x="40" y="218" width="92" height="48" rx="16" fill="#fff" stroke="#e2e8f0"/>
      <path d="M40 250 L40 266 L56 266 Z" fill="#fff" stroke="#e2e8f0"/>
      <circle cx="67" cy="242" r="4" fill="#10b981" opacity="0.45"/>
      <circle cx="85" cy="242" r="4" fill="#10b981" opacity="0.75"/>
      <circle cx="103" cy="242" r="4" fill="#10b981" opacity="0.45"/>
      <rect x="0" y="352" width="526" height="78" fill="#fff"/>
      <line x1="0" y1="352" x2="526" y2="352" stroke="#f1f5f9"/>
      <rect x="20" y="368" width="374" height="46" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="38" y="397" class="small">Ask about products, shipping, returns, or payments...</text>
      <rect x="410" y="368" width="96" height="46" rx="16" fill="#020617"/>
      <text x="434" y="397" font-family="Arial" font-size="13" font-weight="800" fill="white">Sending</text>
    </g>
    <text x="42" y="635" class="caption">The new waiting state matches assistant messages and identifies BrightCart AI.</text>
  </g>
</svg>
